<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpringBoot + Vue サンプル</title>
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" th:href="@{/assets/index.css}">
    <script type="module" th:src="@{/assets/index.js}"></script>
</head>
<body>
    <!-- Vue アプリケーションのルート要素 -->
    <div class="flex-grow flex flex-col">
        <!-- 1. 画面上部ヘッダー（薄い青系の配色） -->
        <header class="bg-blue-600 text-white shadow-md">
            <div class="max-w-7xl mx-auto px-4 py-5 sm:px-6 lg:px-8 flex justify-between items-center">
                <h1 class="text-xl font-bold tracking-tight">
                    SpringBoot＋Vueサンプルプロジェクト
                </h1>
                <span class="bg-blue-500 text-xs px-3 py-1 rounded-full font-medium">
                    Vue 3 稼働中
                </span>
            </div>
        </header>
        <div id="content"></div>
        <!-- フッター -->
        <footer class="bg-slate-100 border-t border-slate-200 py-4">
            <div id="footer" class="max-w-7xl mx-auto px-4 text-center text-sm text-slate-500">
                &copy; 2026 SpringBoot + Vue.js Integration Template.
            </div>
        </footer>
    </div>
</body>
</html>
